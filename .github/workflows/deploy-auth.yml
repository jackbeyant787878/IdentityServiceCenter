name: Deploy IdentityService 

on:
  workflow_dispatch:   # 仅手动触发，不会在 push 时自动运行

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - uses: docker/setup-buildx-action@v3
      
      - name: Login to Tencent Cloud Registry
        uses: docker/login-action@v3
        with:
          registry: ccr.ccs.tencentyun.com
          username: ${{ secrets.TENCENT_REGISTRY_USERNAME }}
          password: ${{ secrets.TENCENT_REGISTRY_PASSWORD }}
          
      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./IdentityService.Auth.HttpApi/Dockerfile
          push: true
          tags: |
            ${{ secrets.TENCENT_REGISTRY }}:latest
            ${{ secrets.TENCENT_REGISTRY }}:${{ github.sha }}
          
          # 🚀【核心修复】彻底关闭产生成果证明与镜像物料清单，防止腾讯云 CCR 接收多架构/元数据时假死
          provenance: false
          sbom: false

  deploy:
    needs: build-and-push
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Copy k8s manifests to server
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USERNAME }}
          password: ${{ secrets.SERVER_PASSWORD }}
          source: "k8s/*"
          target: "/tmp/auth-deploy/"

      - name: Deploy and verify via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USERNAME }}
          password: ${{ secrets.SERVER_PASSWORD }}
          script: |
            set -e  # 💡【核心改进】只要有任何一行命令失败，立即停止脚本并报错！
            cd /tmp/auth-deploy/k8s

            # ---- 1. 创建命名空间 ----
            kubectl apply -f auth-namespace.yaml

            # ---- 2. 创建镜像拉取凭据（动态生成，密码不落盘）----
            kubectl delete secret tcr-secret -n identity --ignore-not-found
            kubectl create secret docker-registry tcr-secret -n identity \
              --docker-server=ccr.ccs.tencentyun.com \
              --docker-username=${{ secrets.TENCENT_REGISTRY_USERNAME }} \
              --docker-password=${{ secrets.TENCENT_REGISTRY_PASSWORD }}

            # ---- 3. 创建应用敏感 Secret（数据库、Redis）----
            kubectl create secret generic auth-secrets -n identity \
              --from-literal=CONNECTIONSTRINGS__DEFAULTCONNECTION="Server=${{ secrets.SQLSERVER_HOST }},1433;Database=IdentityService;User Id=sa;Password=${{ secrets.SQLSERVER_PASSWORD }};TrustServerCertificate=True;MultipleActiveResultSets=true" \
              --from-literal=CONNECTIONSTRINGS__HANGFIRECONNECTION="Server=${{ secrets.SQLSERVER_HOST }},1433;Database=Hangfire;User Id=sa;Password=${{ secrets.SQLSERVER_PASSWORD }};TrustServerCertificate=True;MultipleActiveResultSets=true" \
              --from-literal=REDIS__CONFIGURATION="${{ secrets.REDIS_HOST }}" \
              --from-literal=CONSULCONFIG__REGISTRYADDRESS="${{ secrets.CONSUL_REGISTRY_ADDRESS }}" \
              --dry-run=client -o yaml | kubectl apply -f -

            # ---- 4. 应用 ConfigMap、PVC ----
            kubectl apply -f auth-config.yaml
            kubectl apply -f auth-keys-pvc.yaml

            # ---- 5. 替换镜像标签并部署 ----
            sed -i "s|image:.*|image: ${{ secrets.TENCENT_REGISTRY }}:${{ github.sha }}|g" auth-deployment.yaml
            kubectl apply -f auth-deployment.yaml
            kubectl apply -f auth-service.yaml

            # ---- 6. 等待滚动更新完成 ----
            kubectl rollout status deployment/auth-deployment -n identity --timeout=3m

            # ---- 7. 输出状态 ----
            kubectl get pods -n identity -o wide
            kubectl get svc -n identity
